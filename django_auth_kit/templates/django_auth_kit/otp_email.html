<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
    .container { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background-color: #1a1a2e; padding: 24px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 20px; font-weight: 600; }
    .body { padding: 32px 24px; }
    .body p { color: #333333; line-height: 1.6; margin: 0 0 16px; }
    .code { display: block; text-align: center; font-size: 32px; font-weight: 700; letter-spacing: 8px; color: #1a1a2e; background: #f0f0f5; border-radius: 8px; padding: 16px; margin: 24px 0; }
    .footer { padding: 16px 24px; text-align: center; font-size: 12px; color: #999999; border-top: 1px solid #eeeeee; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Verification Code</h1>
    </div>
    <div class="body">
      <p>Your verification code is:</p>
      <div class="code">{{ otp }}</div>
      <p>This code will expire in 5 minutes. If you did not request this code, please ignore this email.</p>
    </div>
    <div class="footer">
      <p>This is an automated message. Please do not reply.</p>
    </div>
  </div>
</body>
</html>
