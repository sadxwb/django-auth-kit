site_name: Django Auth Kit
site_description: A batteries-included Django authentication package with Strawberry GraphQL, JWT tokens, OTP verification, and optional social login.
repo_url: https://github.com/nichochar/django-auth-kit
repo_name: django-auth-kit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
      - Configuration: configuration.md
  - API Reference:
      - GraphQL API: graphql-api.md
      - SMS Backends: sms-backends.md
  - Guides:
      - Social Login: social-login.md
      - Django Channels: channels.md
  - Internals:
      - Architecture: architecture.md
      - Contributing: contributing.md
